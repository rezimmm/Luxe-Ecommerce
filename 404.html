<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>LUXE</title>
    <script>
      // Single Page App redirect hack for GitHub Pages
      // When GH Pages returns a 404, this page redirects to index.html
      // while preserving the path, query, and hash via sessionStorage.
      var segmentCount = 0; // 0 for root, 1 for subfolder
      // e.g. for rezimmm.github.io/Luxe-Ecommerce/ segmentCount = 1

      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
